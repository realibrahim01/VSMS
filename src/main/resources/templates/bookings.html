<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | VSMS</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: topbar}"></div>
<main class="container">
    <section class="page-title">
        <div>
            <h1>Service Bookings</h1>
            <p>Create appointments and complete bookings into service history.</p>
        </div>
    </section>
    <div class="flash" th:if="${success}" th:text="${success}"></div>

    <section class="split">
        <article class="card">
            <h2>Book Service</h2>
            <form th:action="@{/bookings}" method="post" class="form-grid">
                <label>Vehicle
                    <select name="vehicleId" required>
                        <option value="">Select vehicle</option>
                        <option th:each="vehicle : ${vehicles}"
                                th:value="${vehicle.id}"
                                th:text="${vehicle.registrationNumber + ' - ' + vehicle.customerName}">Vehicle</option>
                    </select>
                </label>
                <label>Service Date <input type="date" name="serviceDate" required></label>
                <label>Service Type
                    <select name="serviceType" required>
                        <option th:each="type : ${serviceTypes}" th:value="${type}" th:text="${type}">Type</option>
                    </select>
                </label>
                <button class="button" type="submit">Create Booking</button>
            </form>
        </article>

        <article class="card">
            <table>
                <thead>
                <tr>
                    <th>Vehicle</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.registrationNumber}">REG</td>
                    <td th:text="${booking.customerName}">Customer</td>
                    <td th:text="${booking.serviceDate}">Date</td>
                    <td th:text="${booking.serviceType}">Type</td>
                    <td><span class="pill" th:text="${booking.status}">Status</span></td>
                    <td>
                        <div class="table-actions">
                            <form th:action="@{/bookings/{id}/status(id=${booking.id})}" method="post">
                                <select name="status">
                                    <option th:each="status : ${statuses}"
                                            th:value="${status}"
                                            th:text="${status}"
                                            th:selected="${status == booking.status}">Status</option>
                                </select>
                                <button class="button secondary" type="submit">Update</button>
                            </form>
                            <form th:action="@{/bookings/{id}/complete(id=${booking.id})}" method="post">
                                <input type="text" name="description" placeholder="Work completed" required>
                                <input type="number" step="0.01" min="0" name="cost" placeholder="Cost" required>
                                <button class="button" type="submit">Complete</button>
                            </form>
                            <form th:action="@{/bookings/{id}/delete(id=${booking.id})}" method="post">
                                <button class="button danger" type="submit">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="6">No bookings found.</td>
                </tr>
                </tbody>
            </table>
        </article>
    </section>
</main>
</body>
</html>
