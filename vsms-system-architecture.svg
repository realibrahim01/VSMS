<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1536" viewBox="0 0 1080 1536">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #d7fffa; }
      .h { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .t { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .s { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { fill: #fff; stroke: #cbd5e1; stroke-width: 2.4; rx: 22; }
      .green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2.4; rx: 22; }
      .blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2.4; rx: 22; }
      .amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 2.4; rx: 22; }
      .violet { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2.4; rx: 22; }
      .line { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .side { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
    </style>
  </defs>

  <rect width="1080" height="1536" fill="url(#bg)"/>

  <rect x="70" y="50" width="940" height="130" rx="28" fill="url(#head)"/>
  <text x="540" y="102" text-anchor="middle" class="title">VSMS System Architecture</text>
  <text x="540" y="140" text-anchor="middle" class="subtitle">Vehicle Service Management System</text>

  <rect x="180" y="240" width="720" height="110" class="amber"/>
  <text x="540" y="285" text-anchor="middle" class="t">Users</text>
  <text x="540" y="320" text-anchor="middle" class="s">Admin • Staff • Customer Support • API Client</text>

  <rect x="180" y="420" width="720" height="130" class="box"/>
  <text x="540" y="468" text-anchor="middle" class="t">Frontend + API Access</text>
  <text x="540" y="503" text-anchor="middle" class="s">Thymeleaf Web UI and REST APIs</text>
  <text x="540" y="529" text-anchor="middle" class="s">Login, Dashboard, Customer, Vehicle, Booking, History</text>

  <rect x="180" y="620" width="720" height="130" class="blue"/>
  <text x="540" y="668" text-anchor="middle" class="t">Controller Layer</text>
  <text x="540" y="703" text-anchor="middle" class="s">Receives requests and sends responses</text>
  <text x="540" y="729" text-anchor="middle" class="s">WebController and REST Controllers</text>

  <rect x="180" y="820" width="720" height="150" class="green"/>
  <text x="540" y="868" text-anchor="middle" class="t">Service Layer</text>
  <text x="540" y="903" text-anchor="middle" class="s">Business logic for booking, history, reminders, dashboard</text>
  <text x="540" y="929" text-anchor="middle" class="s">CustomerService • VehicleService • BookingService • HistoryService</text>

  <rect x="180" y="1040" width="720" height="120" class="violet"/>
  <text x="540" y="1086" text-anchor="middle" class="t">Repository Layer</text>
  <text x="540" y="1121" text-anchor="middle" class="s">Spring Data JPA repositories for database access</text>

  <rect x="180" y="1230" width="720" height="130" class="amber"/>
  <text x="540" y="1278" text-anchor="middle" class="t">MySQL Database</text>
  <text x="540" y="1313" text-anchor="middle" class="s">customers • vehicles • service_bookings • service_history</text>
  <text x="540" y="1339" text-anchor="middle" class="s">Customer → Vehicle → Booking / History</text>

  <path d="M540 350 L540 408" class="line"/>
  <path d="M540 550 L540 608" class="line"/>
  <path d="M540 750 L540 808" class="line"/>
  <path d="M540 970 L540 1028" class="line"/>
  <path d="M540 1160 L540 1218" class="line"/>

  <rect x="50" y="690" width="90" height="250" rx="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="95" y="815" text-anchor="middle" transform="rotate(-90 95 815)" class="side">Security</text>

  <rect x="940" y="690" width="90" height="250" rx="20" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
  <text x="985" y="815" text-anchor="middle" transform="rotate(90 985 815)" class="side">Exception Handling</text>
</svg>
